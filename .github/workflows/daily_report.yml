name: Daily Market Report

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas matplotlib requests numpy

      - name: Issue KIS Access Token
        id: kis_token
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: |
          python - <<'PYEOF'
          import requests, os, sys, time

          key    = os.environ.get('KIS_APP_KEY', '')
          secret = os.environ.get('KIS_APP_SECRET', '')

          if not key or not secret:
              print("KIS API 미설정 → 건너뜀")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("token=\n")
              sys.exit(0)

          token = ''
          # 일시적 연결 오류 대비 최대 3회 재시도
          for attempt in range(1, 4):
              try:
                  resp = requests.post(
                      "https://openapi.koreainvestment.com:9443/oauth2/tokenP",
                      json={"grant_type": "client_credentials", "appkey": key, "appsecret": secret},
                      timeout=15
                  )
                  token = resp.json().get('access_token', '')
                  if token:
                      print(f"KIS Token 발급 성공 (시도 {attempt}/3)")
                      break
                  else:
                      print(f"KIS Token 발급 실패 (시도 {attempt}/3): {resp.text[:200]}")
              except Exception as e:
                  print(f"KIS Token 발급 오류 (시도 {attempt}/3): {e}")

              if attempt < 3:
                  time.sleep(5)

          if not token:
              print("KIS Token 발급 최종 실패 → KIS 데이터 없이 진행")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"token={token}\n")
          PYEOF

      - name: Run Daily Report
        env:
          TELEGRAM_TOKEN_MARKET: ${{ secrets.TELEGRAM_TOKEN_MARKET }}
          TELEGRAM_CHAT_DAILY:   ${{ secrets.TELEGRAM_CHAT_DAILY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          KIS_APP_KEY:           ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:        ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN:      ${{ steps.kis_token.outputs.token }}
        run: python reports/daily_report.py
