name: Weekly/Biweekly/Monthly Market Report

on:
  schedule:
    # 금요일 23:30 UTC = 토요일 08:30 KST (지연 감안 시 09:00~10:00 수신)
    - cron: '30 23 * * 5'
  workflow_dispatch:
    inputs:
      force_biweekly:
        description: '격주 리포트 강제 실행 (true/false)'
        required: false
        default: 'false'
      force_monthly:
        description: '월간 리포트 강제 실행 (true/false)'
        required: false
        default: 'false'

jobs:
  weekend-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas matplotlib requests numpy koreanize-matplotlib

      - name: Issue KIS Access Token
        id: kis_token_weekend
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: |
          python - <<'PYEOF'
          import requests, os, sys
          key    = os.environ.get('KIS_APP_KEY', '')
          secret = os.environ.get('KIS_APP_SECRET', '')
          if not key or not secret:
              print("KIS API 미설정")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("token=\n")
              sys.exit(0)
          resp = requests.post(
              "https://openapi.koreainvestment.com:9443/oauth2/tokenP",
              json={"grant_type": "client_credentials", "appkey": key, "appsecret": secret},
              timeout=10
          )
          token = resp.json().get('access_token', '')
          print(f"KIS Token: {'성공' if token else '실패'}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"token={token}\n")
          PYEOF

      - name: Run Weekly Report
        env:
          TELEGRAM_TOKEN_MARKET:  ${{ secrets.TELEGRAM_TOKEN_MARKET }}
          TELEGRAM_CHAT_WEEKLY:   ${{ secrets.TELEGRAM_CHAT_WEEKLY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          KIS_APP_KEY:            ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:         ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN:       ${{ steps.kis_token_weekend.outputs.token }}
        run: python reports/weekly_report.py

      - name: Check Biweekly Schedule
        id: biweekly_check
        run: |
          python - <<'PYEOF'
          import datetime, os
          today = datetime.date.today()
          week_num = today.isocalendar()[1]
          is_biweekly = (week_num % 2 == 1)
          force = os.environ.get('INPUT_FORCE_BIWEEKLY', 'false').lower() == 'true'
          result = 'true' if (is_biweekly or force) else 'false'
          print(f"주차: {week_num}, 격주 실행: {result}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"run_biweekly={result}\n")
          PYEOF
        env:
          INPUT_FORCE_BIWEEKLY: ${{ github.event.inputs.force_biweekly }}

      - name: Run Biweekly Report
        if: steps.biweekly_check.outputs.run_biweekly == 'true'
        env:
          TELEGRAM_TOKEN_MARKET:    ${{ secrets.TELEGRAM_TOKEN_MARKET }}
          TELEGRAM_CHAT_BIWEEKLY:   ${{ secrets.TELEGRAM_CHAT_BIWEEKLY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
        run: python reports/biweekly_report.py

      - name: Check Monthly Schedule
        id: monthly_check
        run: |
          python - <<'PYEOF'
          import datetime, os
          today = datetime.date.today()
          is_monthly = (today.day <= 7)
          force = os.environ.get('INPUT_FORCE_MONTHLY', 'false').lower() == 'true'
          result = 'true' if (is_monthly or force) else 'false'
          print(f"날짜: {today.day}일, 월간 실행: {result}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"run_monthly={result}\n")
          PYEOF
        env:
          INPUT_FORCE_MONTHLY: ${{ github.event.inputs.force_monthly }}

      - name: Run Monthly Report
        if: steps.monthly_check.outputs.run_monthly == 'true'
        env:
          TELEGRAM_TOKEN_MARKET:  ${{ secrets.TELEGRAM_TOKEN_MARKET }}
          TELEGRAM_CHAT_MONTHLY:  ${{ secrets.TELEGRAM_CHAT_MONTHLY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          KIS_APP_KEY:            ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:         ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN:       ${{ steps.kis_token_weekend.outputs.token }}
        run: python reports/monthly_report.py
